name: Standalone Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  public-web-release-gate:
    name: Public web release gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run public-web QA regression gate
        run: pnpm run quality:test:evals:public-web

  build-bundles:
    name: Build standalone bundles
    runs-on: ${{ matrix.os }}
    needs: public-web-release-gate
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone bundle
        run: bash scripts/build-standalone-bundle.sh "${GITHUB_REF_NAME}"

      - name: Upload standalone assets
        uses: actions/upload-artifact@v7
        with:
          name: standalone-assets-${{ matrix.os }}
          path: dist/release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-bundles
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download standalone assets
        uses: actions/download-artifact@v8
        with:
          path: dist/release-assets
          merge-multiple: true

      - name: Verify GitHub CLI
        run: gh --version

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(dist/release-assets/*)
          notes_file=".github/release-notes/${GITHUB_REF_NAME}.md"

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets were downloaded"
            exit 1
          fi

          if [ -f "${notes_file}" ]; then
            notes="$(cat "${notes_file}")"
          else
            notes=""
          fi

          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            if [ -n "${notes}" ]; then
              gh release edit "${GITHUB_REF_NAME}" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "${GITHUB_REF_NAME}" \
                --notes "${notes}"
            else
              gh release edit "${GITHUB_REF_NAME}" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "${GITHUB_REF_NAME}"
            fi
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            if [ -n "${notes}" ]; then
              gh release create "${GITHUB_REF_NAME}" "${files[@]}" \
                --repo "${GITHUB_REPOSITORY}" \
                --notes "${notes}" \
                --title "${GITHUB_REF_NAME}"
            else
              gh release create "${GITHUB_REF_NAME}" "${files[@]}" \
                --repo "${GITHUB_REPOSITORY}" \
                --generate-notes \
                --title "${GITHUB_REF_NAME}"
            fi
          fi
