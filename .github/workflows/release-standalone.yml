name: Standalone Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-bundles:
    name: Build standalone bundles
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone bundle
        run: bash scripts/build-standalone-bundle.sh "${GITHUB_REF_NAME}"

      - name: Upload standalone assets
        uses: actions/upload-artifact@v4
        with:
          name: standalone-assets-${{ matrix.os }}
          path: dist/release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-bundles
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download standalone assets
        uses: actions/download-artifact@v4
        with:
          path: dist/release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release-assets/*
          generate_release_notes: true
