name: Standalone Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-bundles:
    name: Build standalone bundles
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone bundle
        run: bash scripts/build-standalone-bundle.sh "${GITHUB_REF_NAME}"

      - name: Upload standalone assets
        uses: actions/upload-artifact@v7
        with:
          name: standalone-assets-${{ matrix.os }}
          path: dist/release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-bundles
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download standalone assets
        uses: actions/download-artifact@v8
        with:
          path: dist/release-assets
          merge-multiple: true

      - name: Verify GitHub CLI
        run: gh --version

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(dist/release-assets/*)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets were downloaded"
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${files[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --generate-notes \
              --title "${GITHUB_REF_NAME}"
          fi
