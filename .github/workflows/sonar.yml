name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: read

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare semantic model cache
        run: pnpm run setup:models

      - name: Verify semantic model runners
        run: pnpm run verify:semantic-models

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Ensure Rust quality toolchain
        run: |
          rustup component add rustfmt clippy
          cargo --version
          cargo fmt --version
          cargo clippy --version

      - name: Run lint gate
        run: pnpm run quality:lint

      - name: Run Rust fmt gate
        run: pnpm run quality:fmt

      - name: Run typecheck gate
        run: pnpm run quality:typecheck

      - name: Run Clippy gate
        run: pnpm run quality:clippy

      - name: Run contract gate
        run: pnpm run quality:test:contracts

      - name: Run Rust test gate
        run: pnpm run quality:test:rust

      - name: Run Playwright adapter gate
        run: pnpm run quality:test:adapter

      - name: Run evals gate
        run: pnpm run quality:test:evals

  sonarqube:
    name: SonarQube Scan
    needs: quality-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Ensure Rust toolchain for Sonar analysis
        run: |
          rustup component add clippy
          cargo --version
          cargo clippy --version

      - name: Generate Clippy report for SonarQube
        run: pnpm run quality:sonar-reports

      - name: Generate coverage report for SonarQube
        run: pnpm run quality:sonar-coverage

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL != '' && vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL }}

      - name: Print SonarQube quality gate details
        if: failure()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL != '' && vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL }}
        run: |
          task_file=".scannerwork/report-task.txt"
          if [ ! -f "${task_file}" ]; then
            echo "SonarQube task metadata was not generated."
            exit 0
          fi

          ce_task_id="$(awk -F= '/^ceTaskId=/ { print $2 }' "${task_file}")"
          if [ -z "${ce_task_id}" ]; then
            echo "SonarQube task id was not found."
            exit 0
          fi

          task_json="$(curl --fail --silent --user "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/ce/task?id=${ce_task_id}")"
          analysis_id="$(node -e 'const fs = require("node:fs"); const data = JSON.parse(fs.readFileSync(0, "utf8")); process.stdout.write(data.task?.analysisId || "");' <<< "${task_json}")"
          if [ -z "${analysis_id}" ]; then
            echo "SonarQube analysis id was not available yet."
            exit 0
          fi

          gate_json="$(curl --fail --silent --user "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/qualitygates/project_status?analysisId=${analysis_id}")"
          node -e '
            const fs = require("node:fs");
            const data = JSON.parse(fs.readFileSync(0, "utf8"));
            const projectStatus = data.projectStatus || {};
            console.log(`SonarQube quality gate: ${projectStatus.status || "UNKNOWN"}`);
            for (const condition of projectStatus.conditions || []) {
              console.log(`${condition.status}: ${condition.metricKey} actual=${condition.actualValue ?? "n/a"} threshold=${condition.errorThreshold ?? "n/a"} comparator=${condition.comparator ?? "n/a"}`);
            }
          ' <<< "${gate_json}"

          issues_json="$(curl --fail --silent --user "${SONAR_TOKEN}:" --get "${SONAR_HOST_URL}/api/issues/search" --data-urlencode "componentKeys=touch-browser" --data-urlencode "resolved=false" --data-urlencode "inNewCodePeriod=true" --data-urlencode "ps=20")"
          node -e '
            const fs = require("node:fs");
            const data = JSON.parse(fs.readFileSync(0, "utf8"));
            for (const issue of data.issues || []) {
              const location = `${issue.component || "unknown"}:${issue.line || "n/a"}`;
              console.log(`SonarQube issue: ${issue.severity || "UNKNOWN"} ${issue.rule || "unknown-rule"} ${location} ${issue.message || ""}`);
            }
          ' <<< "${issues_json}"

  public-web-qa:
    name: Public Web QA
    needs: quality-checks
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run public-web QA regression gate
        run: pnpm run quality:test:evals:public-web
