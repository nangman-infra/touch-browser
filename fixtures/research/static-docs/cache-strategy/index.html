    <title>Cache Strategy</title>
  </head>
  <body>
    <main>
      <h1>Cache Strategy</h1>
      <p>
        The acquisition layer stores both requested URLs and final redirected
        URLs as cache aliases.
      </p>
      <ul>
        <li>Reject unsupported content types before snapshot compilation.</li>
        <li>Reuse cache hits to avoid repeated network fetches.</li>
      </ul>
      <p>The current CLI does not depend on a long-lived browser daemon.</p>
    </main>
  </body>
</html>
