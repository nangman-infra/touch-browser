<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Browser High-Risk Checkout</title>
  </head>
  <body>
    <main>
      <h1>Checkout review</h1>
      <p>Confirm payment to place order for the research plan.</p>
      <form id="checkout-form">
        <label>
          Order total
          <input type="text" name="amount" value="$149.00" readonly />
        </label>
        <button type="submit">Confirm purchase</button>
      </form>
      <p id="status">Awaiting payment confirmation.</p>
    </main>
    <script>
      const form = document.getElementById("checkout-form");
      const status = document.getElementById("status");
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        status.textContent = "Purchase confirmation staged for supervised review.";
      });
    </script>
  </body>
</html>
