<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Browser Expand</title>
  </head>
  <body>
    <main>
      <h1>Browser Expand</h1>
      <p>Expand hidden details to reveal the supporting note.</p>
      <button
        type="button"
        onclick="document.getElementById('details').removeAttribute('hidden');"
      >
        Expand details
      </button>
      <p id="details" hidden>
        Expanded details confirm that the runtime can reveal collapsed notes.
      </p>
    </main>
  </body>
</html>
